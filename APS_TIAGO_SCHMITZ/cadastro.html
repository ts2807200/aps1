<!DOCTYPE html>
<html lang="en">
<link rel="stylesheet" href="menu.html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CADASTRO</title>
</head>
<body>
    <h1>Informações Pessoais</h1>
        <form action="" method="get">
            <fieldset>
                <legend>Cadastro do Cliente</legend>
                <p>
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite o nome do cliente" size="100px">
                </p>
                <p>
                    <label for="idade">Idade:</label>
                    <input type="text" id="idade" name="idade" placeholder="Digite a idade" maxlength="3">
                </p>
                <p>
                    <label for="endereco">Endereço:</label>
                    <input type="text" id="endereco" name="endereço" placeholder="Digite o endereço" size="170px">
                </p>
                <p>
                    <label for="cidade">Cidade:</label>
                    <input type="text" id="idade" name="cidade" placeholder="Digite a cidade" size="100px">
                </p>
                <p>
                    <label for="estado">Estado:</label>
                    <input type="text" id="estado" name="estado" placeholder="UF" size="5px" maxlength="2">
                </p>
                <p>
                    <label for="cep">Cep:</label>
                    <input type="text" id="cepUsiario" name="cep" placeholder="XXXXX-XXX" size="30px" maxlength="9">
                </p>
                <p>
                    <label for="telRes">Tel/Res:</label>
                    <input type="text" id="telRes" name="telRes" placeholder=" 99 99999-9999" size="30px" maxlength="13">
                </p>
                <p>
                    <label for="telCes">Tel/Res:</label>
                    <input type="text" id="telCes" name="telCes" placeholder=" 99 99999-9999" size="30px" maxlength="13">
                </p>
                <p>
                    <label for="email">Email:</label>
                    <input type="text" id="email" name="email" placeholder="Digite o endereço de email" size="175px">
                </p>
            </fieldset>
                <input type="submit" value="Enviar">
        </form>
</body>
</html>
